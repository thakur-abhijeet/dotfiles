"$schema" = 'https://starship.rs/config-schema.json'

# Main format configuration
format = """$username$hostname$battery$directory$git_branch$git_status$git_state$line_break$character"""
right_format = """$python$cmd_duration$time"""
add_newline = true

# Color palette configuration
#[palette]
#name = "tokyo_night"

# User interface elements
[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "bold green"
disabled = false

[directory]
fish_style_pwd_dir_length = 1
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[character]
success_symbol = "[â‌¯](green bold)"
error_symbol = "[âœ—](red bold)"
vicmd_symbol = "[V](yellow bold)"

[line_break]
disabled = false

# Git configuration
[git_branch]
format = "[[($symbol$branch)](blue) | ](text)"
symbol = "َ°ک¬ "

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "bold green"
conflicted = "="
ahead = "[â‡،${count}](green)"
behind = "[â‡£${count}](red)"
diverged = "[â‡•â‡،${ahead_count} â‡£${behind_count}](teal)"
up_to_date = "[âœ“](bold green)"
untracked = "[?${count}](maroon)"
stashed = "[ًں“¦](bold green)"
modified = "[!${count}](yellow)"
staged = "[+${count}](green)"
renamed = "[آ»${count}](peach)"
deleted = "[ًں—‘ï¸ڈ ${count}](bold red)"

[git_commit]
format = "[($hash)]($style) [($tag)]($style)"
style = "green"

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "yellow"
format = "[($state( $progress_current/$progress_total))]($style) "

# System information
[battery]
full_symbol = "ًں”‹ "
charging_symbol = "âڑ، "
discharging_symbol = "ًں’€ "
format = "[$symbol$percentage ]($style)"
disabled = false

[[battery.display]]
threshold = 10
style = "bold red"

[[battery.display]]
threshold = 40
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

[cmd_duration]
min_time = 10
format = "[âڈ±ï¸ڈ $duration](bold purple)"
show_milliseconds = true

[time]
format = "[ًں•گ $time]($style)"
style = "bold yellow"
disabled = false
time_format = "%R"

# Language modules
[python]
symbol = "ًںگچ "
format = "[$symbol$pyenv_prefix($version)($virtualenv)]($style)"
style = "bold green"
disabled = false

[package]
format = "[ًں“¦ $symbol$version]($style)"
style = "bold blue"
disabled = false

[rust]
format = "[âڑ™ï¸ڈ $symbol$version]($style)"
style = "bold red"
disabled = false

[nodejs]
format = "[â¬¢ $symbol$version]($style)"
style = "bold green"
disabled = false

[golang]
format = "[ًںگ¹ $symbol$version]($style)"
style = "bold cyan"
disabled = false

