"$schema" = 'https://starship.rs/config-schema.json'

format = """$username$hostname$battery$directory$git_branch$git_status$git_state$line_break$character"""
right_format = """$python$cmd_duration$time"""

add_newline = true

# Enable useful language modules
c.disabled = false
cmake.disabled = false
haskell.disabled = false
python.disabled = false
ruby.disabled = false
rust.disabled = false
perl.disabled = false
package.disabled = false
lua.disabled = false
nodejs.disabled = false
java.disabled = false
golang.disabled = false

palette = "catppuccin_mocha"

[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "bold green"
disabled = false

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"


[line_break]
disabled = false

[directory]
fish_style_pwd_dir_length = 1
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[character]
success_symbol = "[❯](green bold)"
error_symbol = "[✗](red bold)"
vicmd_symbol = "[V](yellow bold)"

[git_branch]
format = "[[\\( $symbol$branch](rosewater) | ](text)"
symbol = "󰘬 "

[git_status]
format = "$all_status$ahead_behind\\)"
conflicted = "="
ahead = "[⇡${count} ](green)"
behind = "[⇣${count} ](red)"
diverged = "[⇕⇡${ahead_count} ⇣${behind_count} ](teal)"
up_to_date = "[✓ ](bold green)"
untracked = "[?${count} ](maroon)"
stashed = "[📦 ](bold green)"
modified = "[!${count} ](yellow)"
staged = "[+${count} ](green)"
renamed = "[»${count} ](peach)"
deleted = "[🗑️ ${count} ](bold red)"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style)"
style = "green"

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[cmd_duration]
min_time = 10
format = '[⏱️ $duration](bold purple)'
show_milliseconds = true

[python]
symbol = "🐍 "
format = '\[[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)\]'
style = "bold green"

[time]
format = '[🕐 $time]($style)'
style = "bold yellow"
disabled = false
time_format = "%R"

[battery]
full_symbol = "🔋"
charging_symbol = "⚡"
discharging_symbol = "💀"
format = '[\[$symbol$percentage]($style)]'
style = "bold green"
disabled = false

[package]
format = '[📦 $symbol$version]($style)'
style = "bold blue"
disabled = false

[rust]
format = '[⚙️ $symbol$version]($style)'
style = "bold red"
disabled = false

[nodejs]
format = '[⬢ $symbol$version]($style)'
style = "bold green"
disabled = false

[golang]
format = '[🐹 $symbol$version]($style)'
style = "bold cyan"
disabled = false
