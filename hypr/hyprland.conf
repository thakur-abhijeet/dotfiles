# Hyprland Configuration
# Author: masubhaat
# Last Updated: 2024

### GENERAL SETTINGS ###
general { 
    # Window Management
    resize_on_border = true 
    allow_tearing = false
    layout = dwindle
        
    # Visual Settings
    gaps_in = 4
    gaps_out = 7
    border_size = 3

    # Border Colors (Catppuccin Mocha Theme)
    col.active_border = rgba(fab387ee) rgba(f38ba8ee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(313244aa)
}

### LAYOUT SETTINGS ###
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_is_master = false
}

### DECORATION SETTINGS ###
decoration {
    # Window Rounding
    rounding = 10
    
    # Blur Settings
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }
    
    # Dim Settings
    dim_inactive = true
    dim_strength = 0.1

    # Shadow Settings
    drop_shadow = true
    shadow_range = 20
    shadow_render_power = 3
    col.shadow = rgba(00000044)
}

### MISC SETTINGS ###
misc { 
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    enable_swallow = true
    swallow_regex = ^(ghostty)$
    focus_on_activate = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

### BINDINGS ###
binds {
    allow_workspace_cycles = true
    workspace_back_and_forth = true
    pass_mouse_when_bound = false
}

### INPUT SETTINGS ###
input {
    kb_layout = us
    follow_mouse = 1
    
    # Keyboard Settings
    repeat_rate = 50
    repeat_delay = 250
    sensitivity = 0.5
    accel_profile = flat

    # Touchpad Settings
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        scroll_factor = 1.0
    }
}

### GESTURES ###
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
}

### ANIMATIONS ###
animations {
    enabled = true
    
    # Bezier Curves
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = smooth, 0.25, 1, 0.5, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = bounce, 0.68, -0.55, 0.27, 1.55
    bezier = perspective, 0.3, -0.4, 0.6, 1.2
    
    # Window Animations
    animation = windows, 1, 5, smooth, slide
    animation = windowsIn, 1, 5, bounce, slide
    animation = windowsOut, 1, 5, bounce, slide
    animation = windowsMove, 1, 5, bounce, slide
    
    # Border Animations
    animation = border, 1, 8, smooth
    animation = borderangle, 1, 40, liner, loop
    
    # Fade Animations
    animation = fade, 1, 7, smooth
    
    # Workspace Animations
    animation = workspaces, 1, 5, overshot, slidevert
    animation = specialWorkspace, 1, 5, smoothOut, slidevert
}

### CURSOR SETTINGS ###
cursor {
    no_hardware_cursors = true
}

### SOURCE CONFIGURATION FILES ###
source = ~/.config/hypr/configs/keybinds.conf
source = ~/.config/hypr/configs/monitors.conf
source = ~/.config/hypr/configs/execs.conf
source = ~/.config/hypr/configs/env_vars.conf
source = ~/.config/hypr/configs/win_rules.conf
