# Hyprpaper Configuration
# Author: masubhaat
# Last Updated: 2024

### WALLPAPER SETTINGS ###
# Preload wallpapers for faster switching
preload = $HOME/Pictures/wallpaper/cosmonaut-in-open-space-art-desktop-wallpaper.jpg

# Set wallpaper for all monitors
wallpaper = ,$HOME/Pictures/wallpaper/cosmonaut-in-open-space-art-desktop-wallpaper.jpg

### DISPLAY SETTINGS ###
# Enable splash screen
splash = true

# Enable wallpaper transitions
transition = true
transition_duration = 0.5
transition_fps = 60
transition_type = fade
