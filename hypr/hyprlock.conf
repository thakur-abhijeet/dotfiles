# Hyprlock Configuration
# Author: masubhaat
# Last Updated: 2024

### GENERAL SETTINGS ###
general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

### COLOR DEFINITIONS ###
# Catppuccin Mocha Theme
$color1 = rgb(180, 190, 254)  # Lavender
$color2 = rgb(137, 180, 250)  # Blue
$color3 = rgb(203, 166, 247)  # Mauve
$color4 = rgb(245, 194, 231)  # Pink
$color5 = rgb(250, 179, 135)  # Peach
$color6 = rgb(249, 226, 175)  # Yellow
$color7 = rgb(166, 227, 161)  # Green
$color8 = rgb(137, 220, 235)  # Teal
$color9 = rgb(243, 139, 168)  # Red
$color10 = rgb(205, 214, 244) # Text
$color11 = rgb(180, 190, 254) # Lavender
$color12 = rgb(137, 180, 250) # Blue
$color13 = rgb(203, 166, 247) # Mauve
$color14 = rgb(245, 194, 231) # Pink
$color15 = rgb(250, 179, 135) # Peach

### BACKGROUND SETTINGS ###
background {
    monitor =
    path = $HOME/Pictures/wallpaper/24.png
    blur_size = 4
    blur_passes = 3
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

### TIME DISPLAY ###
# Hour
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = $color13
    font_size = 180
    font_family = JetBrainsMono Nerd Font ExtraBold 
    position = 0, -100
    halign = center
    valign = top
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = $color12
    font_size = 180
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -450
    halign = center
    valign = top
}

# Seconds
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%S")"
    color = $color11
    font_size = 50
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -400
    halign = center
    valign = top
}

### PASSWORD INPUT ###
input-field {
    monitor =
    size = 200, 40
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.1
    dots_center = true
    dots_rounding = -1
    rounding = 22
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(255, 255, 255, 0.9)
    font_color = $color13
    capslock_color = rgb(255,255,255)
    fade_on_empty = true
    font_family = JetBrainsMono Nerd Font ExtraBold 
    placeholder_text = <i>PASSWORD<span foreground="##ffffff99"></span></i>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}
